name: Build & Deploy to cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy via cPanel UAPI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Typecheck frontend
        run: pnpm --filter @workspace/celewe-events typecheck

      - name: Build frontend
        run: cd artifacts/celewe-events && pnpm build
        env:
          BASE_PATH: /
          PORT: 4175

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy via FTPS mirror
        run: |
          SITE_URL="${{ secrets.CPANEL_SITE_URL }}"
          SITE_URL="${SITE_URL#http://}"
          SITE_URL="${SITE_URL#https://}"
          SITE_URL="${SITE_URL%%/*}"
          CPANEL_HOST="${{ secrets.CPANEL_HOST }}"
          CPANEL_HOST="${CPANEL_HOST#http://}"
          CPANEL_HOST="${CPANEL_HOST#https://}"
          CPANEL_HOST="${CPANEL_HOST%%/*}"

          HOSTS=("${SITE_URL}" "${CPANEL_HOST}")
          SUCCESS=0

          for HOST in "${HOSTS[@]}"; do
            [ -z "$HOST" ] && continue
            echo "Trying FTPS deploy to host: $HOST"

            lftp -u "${{ secrets.CPANEL_USERNAME }}","${{ secrets.CPANEL_PASSWORD }}" "$HOST" <<'EOF' && SUCCESS=1
set ssl:verify-certificate no
set ftp:ssl-force true
set ftp:ssl-protect-data true
set xfer:clobber on
mirror -R --delete --verbose artifacts/celewe-events/dist/public /public_html
bye
EOF

            if [ "$SUCCESS" -eq 1 ]; then
              echo "FTPS deploy succeeded on host: $HOST"
              SUCCESS=1
              break
            fi
          done

          if [ "$SUCCESS" -ne 1 ]; then
            echo "FTPS deployment failed on all candidate hosts"
            exit 1
          fi
