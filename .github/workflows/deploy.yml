name: Build & Deploy to cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy via cPanel UAPI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Typecheck frontend
        run: pnpm --filter @workspace/celewe-events typecheck

      - name: Build frontend
        run: cd artifacts/celewe-events && pnpm build
        env:
          BASE_PATH: /
          PORT: 4175

      - name: Zip build output
        run: cd artifacts/celewe-events/dist/public && zip -r ../../../../deploy.zip .

      - name: Cleanup old files on server
        run: |
          curl -k -s \
            -u "${{ secrets.CPANEL_USERNAME }}:${{ secrets.CPANEL_PASSWORD }}" \
            "https://${{ secrets.CPANEL_HOST }}:2083/execute/Fileman/delete_files" \
            -d "files%5B0%5D%5Bpath%5D=%2Fhome%2F${{ secrets.CPANEL_USERNAME }}%2Fpublic_html&files%5B0%5D%5Bname%5D=deploy.zip&discard_trash=1" || true
          curl -k -s \
            -u "${{ secrets.CPANEL_USERNAME }}:${{ secrets.CPANEL_PASSWORD }}" \
            "https://${{ secrets.CPANEL_HOST }}:2083/execute/Fileman/delete_files" \
            -d "files%5B0%5D%5Bpath%5D=%2Fhome%2F${{ secrets.CPANEL_USERNAME }}%2Fpublic_html&files%5B0%5D%5Bname%5D=extractor.php&discard_trash=1" || true

      - name: Upload zip to cPanel
        run: |
          curl -k -s -o upload_zip.json \
            -u "${{ secrets.CPANEL_USERNAME }}:${{ secrets.CPANEL_PASSWORD }}" \
            "https://${{ secrets.CPANEL_HOST }}:2083/execute/Fileman/upload_files" \
            -F "dir=/home/${{ secrets.CPANEL_USERNAME }}/public_html" \
            -F "file-1=@deploy.zip"
          cat upload_zip.json
          grep -q '"status":1' upload_zip.json || (echo "Upload zip failed" && exit 1)

      - name: Upload PHP extractor
        run: |
          curl -k -s -o upload_php.json \
            -u "${{ secrets.CPANEL_USERNAME }}:${{ secrets.CPANEL_PASSWORD }}" \
            "https://${{ secrets.CPANEL_HOST }}:2083/execute/Fileman/upload_files" \
            -F "dir=/home/${{ secrets.CPANEL_USERNAME }}/public_html" \
            -F "file-1=@scripts/extractor.php"
          cat upload_php.json
          grep -q '"status":1' upload_php.json || (echo "Upload PHP failed" && exit 1)

      - name: Run PHP extractor
        run: |
          sleep 2
          SITE_URL="${{ secrets.CPANEL_SITE_URL }}"
          SITE_URL="${SITE_URL#http://}"
          SITE_URL="${SITE_URL#https://}"
          CPANEL_HOST="${{ secrets.CPANEL_HOST }}"
          CPANEL_HOST="${CPANEL_HOST#http://}"
          CPANEL_HOST="${CPANEL_HOST#https://}"

          URLS=("https://${SITE_URL}/extractor.php" "https://${CPANEL_HOST}/extractor.php")
          SUCCESS=0

          for URL in "${URLS[@]}"; do
            echo "Trying extractor URL: $URL"
            RESULT=$(curl -k -s "$URL" || true)
            echo "Extractor result from $URL: $RESULT"

            if echo "$RESULT" | grep -q '"ok":true'; then
              SUCCESS=1
              break
            fi
          done

          if [ "$SUCCESS" -ne 1 ]; then
            echo "PHP extraction failed on all candidate URLs"
            exit 1
          fi
