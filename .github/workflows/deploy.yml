name: Build & Deploy to cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy via cPanel UAPI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build frontend
        run: |
          cd artifacts/celewe-events
          pnpm build
        env:
          BASE_PATH: /
          PORT: 4175

      - name: Zip build output
        run: |
          cd artifacts/celewe-events/dist/public
          zip -r ../../../../deploy.zip .

      - name: Upload zip to cPanel
        run: |
          # Upload the deploy zip
          curl -k -s -o upload_response.json \
            -u "${{ secrets.CPANEL_USERNAME }}:${{ secrets.CPANEL_PASSWORD }}" \
            "https://${{ secrets.CPANEL_HOST }}:2083/execute/Fileman/upload_files" \
            -F "dir=/home/${{ secrets.CPANEL_USERNAME }}/public_html" \
            -F "file-1=@deploy.zip"
          cat upload_response.json
          grep -q '"status":1' upload_response.json || (echo "Upload zip failed" && exit 1)

          # Upload a PHP extractor script
          cat > extractor.php << 'PHPEOF'
          <?php
          $zip = new ZipArchive;
          $zipPath = __DIR__ . '/deploy.zip';
          $dest = __DIR__ . '/';
          if ($zip->open($zipPath) === TRUE) {
              $zip->extractTo($dest);
              $zip->close();
              unlink($zipPath);
              unlink(__FILE__);
              echo json_encode(['ok' => true]);
          } else {
              http_response_code(500);
              echo json_encode(['ok' => false, 'error' => 'ZipArchive failed']);
          }
          PHPEOF
          curl -k -s -o upload_php.json \
            -u "${{ secrets.CPANEL_USERNAME }}:${{ secrets.CPANEL_PASSWORD }}" \
            "https://${{ secrets.CPANEL_HOST }}:2083/execute/Fileman/upload_files" \
            -F "dir=/home/${{ secrets.CPANEL_USERNAME }}/public_html" \
            -F "file-1=@extractor.php"
          cat upload_php.json
          grep -q '"status":1' upload_php.json || (echo "Upload PHP failed" && exit 1)

      - name: Run PHP extractor
        run: |
          RESULT=$(curl -k -s "https://${{ secrets.CPANEL_SITE_URL }}/extractor.php")
          echo "Extractor result: $RESULT"
          echo "$RESULT" | grep -q '"ok":true' || (echo "PHP extraction failed: $RESULT" && exit 1)
