name: Build & Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & SSH Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: |
          cd artifacts/celewe-events
          pnpm build
        env:
          BASE_PATH: /
          PORT: 4175

      - name: Deploy to cPanel via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_USERNAME }}
          password: ${{ secrets.CPANEL_PASSWORD }}
          port: ${{ secrets.CPANEL_PORT }}
          source: "artifacts/celewe-events/dist/public/*"
          target: ${{ secrets.CPANEL_TARGET_DIR }}
          strip_components: 4
          rm: false
